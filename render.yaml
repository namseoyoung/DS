services:
  - type: web
    name: ds-investment-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:server
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000
      - key: CLIENT_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
